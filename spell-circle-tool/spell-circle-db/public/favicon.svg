<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a0c14"/>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="14" stroke="#0095ff" stroke-width="0.5" fill="none" opacity="0.8"/>
  <circle cx="16" cy="16" r="12" stroke="#8b5cf6" stroke-width="0.3" fill="none" opacity="0.6"/>
  
  <!-- Inner decorative ring -->
  <circle cx="16" cy="16" r="9" stroke="#0095ff" stroke-width="0.5" stroke-dasharray="2 1" fill="none" opacity="0.7"/>
  
  <!-- Hexagram -->
  <polygon 
    points="16,4 22,10 22,22 16,28 10,22 10,10" 
    stroke="#8b5cf6" 
    stroke-width="0.5" 
    fill="none"
    opacity="0.6"
  />
  <polygon 
    points="16,4 22,10 22,22 16,28 10,22 10,10" 
    stroke="#0095ff" 
    stroke-width="0.5" 
    fill="none"
    opacity="0.5"
    transform="rotate(30 16 16)"
  />
  
  <!-- Center glow -->
  <circle cx="16" cy="16" r="4" fill="url(#centerGlow)"/>
  
  <!-- Rune symbols -->
  <text x="16" y="17.5" text-anchor="middle" fill="#0095ff" font-size="6" font-family="serif" opacity="0.9">✦</text>
  
  <defs>
    <radialGradient id="centerGlow">
      <stop offset="0%" stop-color="#0095ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>


