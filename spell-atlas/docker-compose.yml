services:
  spell-atlas:
    build: .
    # Or, once you've pushed an image to a registry:
    # image: your-registry/spell-atlas:latest
    container_name: spell-atlas
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-5}
      - APP_PASSWORD=${APP_PASSWORD}
      - DATABASE_PATH=/data/spell-atlas.db
    volumes:
      # Bind mount to a folder on your NAS pool so the database is easy to
      # find, back up, and snapshot. Create this folder on the NAS before
      # first start (see README). If your pool is not volume1, change the
      # left-hand path to match your UGREEN shared-folder layout.
      - /volume1/dockerapps/appdata/spell-atlas:/data
