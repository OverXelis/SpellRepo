services:
  spell-atlas:
    build: .
    # Or, once you've pushed an image to a registry:
    # image: your-registry/spell-atlas:latest
    container_name: spell-atlas
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-5}
      - APP_PASSWORD=${APP_PASSWORD}
      - DATABASE_PATH=/data/spell-atlas.db
    volumes:
      # Bind mount — database lives on the NAS pool at this path (not inside
      # Docker's internal volumes). One-time host setup: create the folder and
      # chown to your NAS user (see README). Portainer: redeploy stack after
      # this file changes on main.
      - /volume2/dockerapps/appdata/spell-atlas:/data
